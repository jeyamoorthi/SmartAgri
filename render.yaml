services:
  # FastAPI Backend Service
  - type: web
    name: smartagri-backend
    env: python
    rootDir: smartagri-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: smartagri_db
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BHASHINI_USER_ID
        sync: false
      - key: BHASHINI_API_KEY
        sync: false
      - key: BHASHINI_AUTH
        sync: false

  # Vite React Frontend (Static Site)
  - type: web
    name: smartagri-frontend
    env: static
    rootDir: smartagri-frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: smartagri-backend
          type: web
          property: host
