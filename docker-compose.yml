version: '3.8'

services:
  # 1. FastAPI Backend (Core AI, DB, Voice — unified on port 8000)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env

  # 2. React Vite Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - frontend/.env
    depends_on:
      - backend
